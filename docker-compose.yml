services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: wealthfolio-db
    environment:
      POSTGRES_USER: wealthfolio
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD missing — copy .env.example to .env}
      POSTGRES_DB: wealthfolio
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wealthfolio -d wealthfolio']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: wealthfolio:local
    container_name: wealthfolio-app
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data/uploads:/data/uploads
    ports:
      - '3000:8000'
    restart: unless-stopped
